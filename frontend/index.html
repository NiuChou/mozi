<!doctype html>
<html lang="zh-CN" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f4efe5" />
    <title>墨子 · Chat</title>
    <!-- 防主题闪烁: 渲染前按 localStorage 落 data-theme -->
    <script>
      try {
        var t = localStorage.getItem("mozi-theme");
        if (t === "dark" || t === "light") document.documentElement.dataset.theme = t;
      } catch (e) {}
    </script>
    <!-- 宋韵字: 宋体衬线 (身份/标题) + 等宽 (数据/科技) — 系统字优先, 网络字回退 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
